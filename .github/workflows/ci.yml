name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (Godog spec suite + unit tests)
        shell: bash
        run: |
          if go test -timeout 20m ./... > test-output.log 2>&1; then
            cat test-output.log
          else
            head -120 test-output.log
            tail -80 test-output.log
            while IFS= read -r line; do
              echo "::error::$line"
            done < <(head -120 test-output.log; tail -80 test-output.log)
            exit 1
          fi
      - name: Standard library (nested module)
        run: |
          go build -o /tmp/goplus ./cmd/goplus
          cd std
          /tmp/goplus gen -check ./...
          go vet ./...
          go test ./...
      - name: Standard library law tests (nested lawtest module)
        run: |
          cd std/algebra/lawtest
          go test ./...
