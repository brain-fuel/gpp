name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [stable, oldstable]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (Godog spec suite + unit tests)
        run: go test ./...
      - name: Standard library (nested module)
        run: |
          go build -o /tmp/goplus ./cmd/goplus
          cd std
          /tmp/goplus gen -check ./...
          go vet ./...
          go test ./...
      - name: Standard library law tests (nested lawtest module)
        run: |
          cd std/algebra/lawtest
          go test ./...
