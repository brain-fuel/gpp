name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (Godog spec suite + unit tests)
        shell: bash
        run: |
          status=0
          {
            go test -timeout 20m . &&
              go test -timeout 10m ./cmd/... ./internal/...
          } > test-output.log 2>&1 || status=$?
          if [[ $status -eq 0 ]]; then
            cat test-output.log
          elif [[ "$RUNNER_OS" == "Windows" ]] &&
               [[ $(grep -Ec '^(ok|\?)  ' test-output.log) -eq $(go list ./... | wc -l) ]] &&
               ! grep -Eq '^(FAIL|# )|panic:' test-output.log; then
            # Go on the Windows runner can return a non-zero command status
            # after every package has completed successfully. Accept only a
            # complete, failure-free package accounting; do not mask a real
            # test, panic, or compilation failure.
            cat test-output.log
            echo "::warning::go test exited $status after every package passed"
          else
            head -120 test-output.log
            tail -80 test-output.log
            while IFS= read -r line; do
              echo "::error::$line"
            # GitHub retains only the first few command annotations. Emit the
            # tail first because Go reports package failures and its final
            # status there; the ordinary excerpt above remains head then tail.
            done < <(tail -80 test-output.log; head -120 test-output.log)
            exit 1
          fi
      - name: Standard library (nested module)
        run: |
          go build -o /tmp/goplus ./cmd/goplus
          cd std
          /tmp/goplus gen -check ./...
          go vet ./...
          go test ./...
      - name: Standard library law tests (nested lawtest module)
        run: |
          cd std/algebra/lawtest
          go test ./...
